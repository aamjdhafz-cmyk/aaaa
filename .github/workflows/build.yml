name: Build Android APK
on:
 push:
 branches: [ main ]
jobs:
 build:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v3
 - name: Set up Node.js
 uses: actions/setup-node@v3
 with:
 node-version: 16
 - name: Install Cordova
 run: npm install -g cordova
 - name: Create Cordova Project
 run: |
 cordova create myapp com.rashed.app "RashedApp"
 cd myapp
 cordova platform add android
 - name: Copy HTML files to App
 run: |
 rm -rf myapp/www/*
 cp Finance_Pro_4.0.html myapp/www/index.html
 cp diesel_system.html myapp/www/
 - name: Setup Java JDK
 uses: actions/setup-java@v3
 with:
 distribution: 'zulu'
 java-version: '11'
 - name: Build APK
 run: |
 cd myapp
 cordova build android --device
 - name: Upload APK
 uses: actions/upload-artifact@v3
 with:
 name: MyAndroidApp-APK
 path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
