
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finance Pro 4.0</title>
<style>
body{font-family:Tahoma,Arial;background:#f4f6f9;margin:0;padding:15px}
.wrap{max-width:1400px;margin:auto}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.stat{text-align:center;padding:10px;background:#f8f8f8;border-radius:8px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#eaeaea}
input,button,select{padding:8px;margin:4px}
.dark{background:#1e1e1e;color:#eee}
.dark .card{background:#2d2d2d}
</style>
</head>
<body>
<div class="wrap">

<div class="card">
<h1>المنظومة الذكية للحسابات الاحترافية 4.0</h1>
<button onclick="toggleDark()">الوضع الليلي</button>
<button onclick="backup()">نسخة احتياطية</button>
<button onclick="exportCSV()">تصدير Excel CSV</button>
<button onclick="window.print()">طباعة</button>
</div>

<div class="card grid">
<div class="stat">إجمالي النقل<br><b id="s1">0</b></div>
<div class="stat">إجمالي المولد<br><b id="s2">0</b></div>
<div class="stat">إجمالي الوايتات<br><b id="s3">0</b></div>
<div class="stat">الإجمالي العام<br><b id="s4">0</b></div>
<div class="stat">عدد السجلات<br><b id="cnt">0</b></div>
</div>

<div class="card">
<h3>إضافة قيد</h3>
<input type="date" id="d">
<input type="number" id="tq" placeholder="عدد النقل">
<input type="number" id="tp" placeholder="سعر النقل">
<input type="number" id="gq" placeholder="عدد المولد">
<input type="number" id="gp" placeholder="سعر المولد">
<input type="number" id="wq" placeholder="عدد الوايتات">
<input type="number" id="wp" placeholder="سعر الوايتات">
<input type="text" id="note" placeholder="ملاحظات">
<button onclick="save()">حفظ</button>
</div>

<div class="card">
<h3>التقارير</h3>
<input id="search" placeholder="بحث بالتاريخ أو الملاحظة" oninput="render()">
<select id="monthFilter" onchange="render()">
<option value="">كل الأشهر</option>
<option value="-01-">يناير</option>
<option value="-02-">فبراير</option>
<option value="-03-">مارس</option>
<option value="-04-">أبريل</option>
<option value="-05-">مايو</option>
<option value="-06-">يونيو</option>
<option value="-07-">يوليو</option>
<option value="-08-">أغسطس</option>
<option value="-09-">سبتمبر</option>
<option value="-10-">أكتوبر</option>
<option value="-11-">نوفمبر</option>
<option value="-12-">ديسمبر</option>
</select>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>التاريخ</th>
<th>النقل</th>
<th>المولد</th>
<th>الوايتات</th>
<th>الإجمالي</th>
<th>ملاحظات</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script>
let data=JSON.parse(localStorage.getItem('finance4')||'[]');
let edit=-1;

function fmt(x){return Number(x).toLocaleString('ar');}

function save(){
let r={
d:d.value,tq:+tq.value||0,tp:+tp.value||0,
gq:+gq.value||0,gp:+gp.value||0,
wq:+wq.value||0,wp:+wp.value||0,
note:note.value||''
};
if(!r.d){alert('أدخل التاريخ');return;}
if(edit>=0){data[edit]=r;edit=-1;} else data.push(r);
localStorage.setItem('finance4',JSON.stringify(data));
clearForm();
render();
}

function clearForm(){
document.querySelectorAll('input').forEach(i=>{
if(i.type!='search') i.value='';
});
}

function render(){
let q=search.value.toLowerCase();
let mf=monthFilter.value;

let s1=0,s2=0,s3=0,s4=0;

tb.innerHTML='';

data.filter(r=>{
let ok1=!q || r.d.includes(q) || (r.note||'').toLowerCase().includes(q);
let ok2=!mf || r.d.includes(mf);
return ok1 && ok2;
})
.sort((a,b)=>a.d.localeCompare(b.d))
.forEach((r,i)=>{
let a=r.tq*r.tp,b=r.gq*r.gp,c=r.wq*r.wp,total=a+b+c;
s1+=a;s2+=b;s3+=c;s4+=total;

tb.innerHTML+=`
<tr>
<td>${r.d}</td>
<td>${fmt(a)}</td>
<td>${fmt(b)}</td>
<td>${fmt(c)}</td>
<td><b>${fmt(total)}</b></td>
<td>${r.note||''}</td>
<td><button onclick="editRec(${i})">تعديل</button></td>
<td><button onclick="delRec(${i})">حذف</button></td>
</tr>`;
});

s1El=s1;s2El=s2;s3El=s3;s4El=s4;
document.getElementById('s1').innerText=fmt(s1);
document.getElementById('s2').innerText=fmt(s2);
document.getElementById('s3').innerText=fmt(s3);
document.getElementById('s4').innerText=fmt(s4);
document.getElementById('cnt').innerText=data.length;
}

function editRec(i){
let r=data[i];
d.value=r.d;tq.value=r.tq;tp.value=r.tp;
gq.value=r.gq;gp.value=r.gp;
wq.value=r.wq;wp.value=r.wp;
note.value=r.note||'';
edit=i;
}

function delRec(i){
if(confirm('حذف السجل؟')){
data.splice(i,1);
localStorage.setItem('finance4',JSON.stringify(data));
render();
}
}

function backup(){
let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='finance4_backup.json';
a.click();
}

function exportCSV(){
let csv="التاريخ,النقل,المولد,الوايتات,الإجمالي,ملاحظات\n";
data.forEach(r=>{
let total=(r.tq*r.tp)+(r.gq*r.gp)+(r.wq*r.wp);
csv+=`${r.d},${r.tq*r.tp},${r.gq*r.gp},${r.wq*r.wp},${total},"${r.note||''}"\n`;
});
let blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='finance_report.csv';
a.click();
}

function toggleDark(){
document.body.classList.toggle('dark');
}

render();
</script>
</body>
</html>
